<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Bini</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    overflow:hidden;
}

/* teks nama */
.nama{
    font-size:60px;
    color:white;
    font-weight:bold;
    letter-spacing:4px;
    text-shadow:0 0 10px pink,0 0 20px hotpink;
    margin-bottom:40px;
    animation: glow 2s ease-in-out infinite alternate;
    z-index:2;
}

/* tombol next */
.btn-next{
    text-decoration:none;
    padding:15px 40px;
    font-size:18px;
    color:white;
    background:linear-gradient(45deg,pink,hotpink);
    border-radius:30px;
    transition:0.3s;
    font-weight:bold;
    box-shadow:0 0 15px pink;
    z-index:2;
    position:relative;
}

.btn-next:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px hotpink;
}

/* animasi glow */
@keyframes glow{
    from{
        text-shadow:0 0 10px pink;
    }
    to{
        text-shadow:0 0 20px pink,0 0 40px red;
    }
}

/* bintang background */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:url("https://www.transparenttextures.com/patterns/stardust.png");
    opacity:0.4;
    animation: move 60s linear infinite;
    pointer-events:none; /* supaya tidak menutup tombol */
}

@keyframes move{
    from{background-position:0 0;}
    to{background-position:1000px 1000px;}
}

</style>

</head>

<body>

<div class="nama">FOR MY LITTLE FLOWER ❤️</div>

<div class="next-button">
<a href="main.html" class="btn-next">Next ➜</a>
</div>

</body>
</html>
