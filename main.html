<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"/>

<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css"/>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap');

body{
font-family:'Poppins',sans-serif;
text-align:center;
background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
}

p{
text-align:left;
}

img{
border-radius:10px;
}

.content{
margin:55px 0;
}

.maaf{
text-align:left;
height:100px;
overflow:hidden;
margin-bottom:50px;
}

/* album foto */

.album-title{
margin-top:60px;
margin-bottom:30px;
font-weight:bold;
}

.photo{
transition:0.4s;
}

.photo:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(5px);
}

</style>

<title>For my beats</title>
</head>

<body>

<div class="container mb-3">

<div class="content">

<h1 data-aos="fade-up">
💖 Maafin aku pweasee senggg :<
</h1>

<p data-aos="fade-up">
Forgive me pliss sengg, namanya juga manusia bukan nabi boy
</p>

<h6 data-aos="fade-up">Dimaafin ga ni ?</h6>

<div class="maaf">

<button class="btn btn-success"
data-aos="fade-up"
data-aos-delay="1000"
onclick="iya()">iya dimaafin kok</button>

<button
class="btn btn-danger"
data-aos="fade-up"
data-aos-delay="1200"
id="btn_gamau"
onmouseover="gamau(this)"
onclick="gamau(this)"
style="position:absolute">

engga.

</button>

</div>

<p data-aos="fade-up">
Aku cuma mau bilang makasih karena kamu selalu ada buat aku.
Semoga kita bisa terus bareng dan bikin kenangan indah lagi.
</p>

</div>

<!-- CARD FOTO -->

<div class="card shadow w-50 mx-auto text-center mt-5 mb-3"
data-aos="flip-left">

<img src="WhatsApp Image 2026-03-13 at 07.15.48.jpeg"
class="card-img-top">

<div class="card-body">
<h6 class="card-text">bonus card kamu hehe</h6>
</div>

</div>


<!-- ALBUM FOTO -->

<h3 class="album-title" data-aos="fade-up">Our Memories 📸</h3>

<div class="row">

<div class="col-md-4 mb-4" data-aos="zoom-in">
<img src="foto1.jpg" class="img-fluid photo">
</div>

<div class="col-md-4 mb-4" data-aos="zoom-in">
<img src="foto2.jpg" class="img-fluid photo">
</div>

<div class="col-md-4 mb-4" data-aos="zoom-in">
<img src="foto3.jpg" class="img-fluid photo">
</div>

<div class="col-md-4 mb-4" data-aos="zoom-in">
<img src="foto4.jpg" class="img-fluid photo">
</div>

<div class="col-md-4 mb-4" data-aos="zoom-in">
<img src="foto5.jpg" class="img-fluid photo">
</div>

<div class="col-md-4 mb-4" data-aos="zoom-in">
<img src="foto6.jpg" class="img-fluid photo">
</div>

</div>

<span id="typed"
class="mb-3 font-weight-bolder text-uppercase"></span>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://unpkg.com/aos@next/dist/aos.js"></script>

<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

<script>

AOS.init();

var typed = new Typed('#typed',{
strings:[
'This is for you sengg ❤️',
'I love you more everyday'
],
typeSpeed:100,
backSpeed:60,
loop:true
});

function gamau(id){

const div=document.querySelector('.maaf');

const rect=div.getBoundingClientRect();

let maxWidth=rect.left;
let minWidth=rect.right;

let maxHeight=rect.bottom;
let minHeight=rect.top;

let i=minWidth+Math.floor(Math.random()*(maxWidth-(minWidth+30)));

let j=div.offsetTop+Math.floor(Math.random()*(maxHeight-minHeight));

id.style.left=i+'px';
id.style.top=j+'px';

}

function iya(){

Swal.fire({
title:'YAAASHHHHH!',
text:'BAIK BGT DEH AYANG 😍',
imageUrl:'https://media.giphy.com/media/Ka2V8MODoM7vrUd7hm/giphy.gif',
imageWidth:300,
width:330
}).then(()=>{
window.location.href="end.html";
});

}

</script>

</body>
</html>
